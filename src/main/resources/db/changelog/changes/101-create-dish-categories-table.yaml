databaseChangeLog:
  - changeSet:
      id: create-dish-categories-table
      author: Ivanov Yurii
      changes:
        - createTable:
            tableName: dish_categories
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: description
                  type: varchar(1024)  # Опис категорії страви
                  constraints:
                    nullable: true
