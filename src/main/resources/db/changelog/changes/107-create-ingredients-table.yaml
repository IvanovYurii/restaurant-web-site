databaseChangeLog:
  - changeSet:
      id: create-ingredients-table
      author: Ivanov Yurii
      changes:
        - createTable:
            tableName: ingredients
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
